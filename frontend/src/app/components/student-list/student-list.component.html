<h2>Students</h2>
<table>
  <tr>
    <th>Name</th>
    <th>Email</th>
    <th>Actions</th>
  </tr>
  <tr *ngFor="let s of students">
    <td>{{s.name}}</td>
    <td>{{s.email}}</td>
    <td>
      <button [routerLink]="['/student-form', s.id]">Edit</button>
      <button (click)="delete(s.id)">Delete</button>
    </td>
  </tr>
</table>
<button [routerLink]="['/student-form']">Add Student</button>
